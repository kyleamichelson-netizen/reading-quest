<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222638;
  --border: #2e3348;
  --gold: #f5c842;
  --gold-dim: #c49d1f;
  --teal: #3ecfb2;
  --coral: #ff6b6b;
  --text: #e8eaf0;
  --muted: #7a7f9a;
  --radius: 14px;
  --correct: #3ecfb2;
  --wrong: #ff6b6b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Stars background */
body::before {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image: radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 90%, rgba(255,255,255,0.2) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}

.container { max-width: 700px; margin: 0 auto; padding: 0 1.25rem 4rem; position: relative; z-index: 1; }

/* ── Screen system ── */
.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }

/* ── Header ── */
.site-header { text-align: center; padding: 3rem 0 2rem; }
.site-header .eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
.site-header h1 { font-family: 'Lora', serif; font-size: clamp(2.2rem, 6vw, 3.4rem); font-weight: 600; color: var(--text); line-height: 1.1; }
.site-header h1 span { color: var(--gold); font-style: italic; }
.site-header p { font-size: 15px; color: var(--muted); margin-top: 0.75rem; line-height: 1.6; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 1rem; }
.card-sm { padding: 1.25rem 1.5rem; }

/* ── Name screen ── */
.name-label { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; display: block; }
.name-input { width: 100%; height: 50px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0 16px; font-size: 17px; font-family: 'Nunito', sans-serif; color: var(--text); transition: border-color 0.2s; }
.name-input:focus { outline: none; border-color: var(--gold); }
.name-input::placeholder { color: var(--muted); }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; justify-content: center; height: 48px; padding: 0 28px; border-radius: 10px; font-size: 15px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; border: none; transition: all 0.15s; }
.btn-gold { background: var(--gold); color: #111; }
.btn-gold:hover { background: #f7d35a; transform: translateY(-1px); }
.btn-gold:active { transform: scale(0.98); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* ── Book shelf ── */
.shelf-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
.shelf-header h2 { font-family: 'Lora', serif; font-size: 20px; color: var(--text); }
.points-badge { background: var(--surface2); border: 1px solid var(--gold); border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 700; color: var(--gold); }

.book-grid { display: flex; flex-direction: column; gap: 10px; }
.book-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.book-item:hover { border-color: var(--gold); background: var(--surface2); }
.book-item.completed { border-color: var(--teal); opacity: 0.7; cursor: default; }
.book-item.completed:hover { border-color: var(--teal); background: var(--surface); }

.book-emoji { font-size: 28px; width: 44px; text-align: center; flex-shrink: 0; }
.book-info { flex: 1; }
.book-title { font-size: 15px; font-weight: 700; color: var(--text); }
.book-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.book-pts { font-size: 13px; font-weight: 700; color: var(--gold); background: rgba(245,200,66,0.12); padding: 3px 10px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
.book-pts.earned { color: var(--teal); background: rgba(62,207,178,0.12); }
.book-pts.attempted { color: var(--coral); background: rgba(255,107,107,0.12); }

/* ── Quiz header ── */
.quiz-top { margin-bottom: 1.5rem; }
.quiz-book-name { font-family: 'Lora', serif; font-size: 18px; color: var(--text); margin-bottom: 4px; }
.quiz-sub { font-size: 13px; color: var(--muted); }
.progress-wrap { height: 5px; background: var(--surface2); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; }

/* ── Question ── */
.q-num { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.q-text { font-size: 16px; line-height: 1.65; color: var(--text); margin-bottom: 1.25rem; font-weight: 600; }
.choices { display: flex; flex-direction: column; gap: 8px; }
.choice { display: flex; align-items: flex-start; gap: 12px; padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface2); cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); text-align: left; transition: all 0.15s; line-height: 1.5; }
.choice:hover:not(:disabled) { border-color: var(--gold); background: rgba(245,200,66,0.07); }
.choice.selected { border-color: var(--gold); background: rgba(245,200,66,0.12); }
.choice.correct { border-color: var(--teal); background: rgba(62,207,178,0.12); color: var(--teal); }
.choice.wrong { border-color: var(--coral); background: rgba(255,107,107,0.12); color: var(--coral); }
.choice-letter { width: 24px; height: 24px; min-width: 24px; border-radius: 6px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--muted); margin-top: 1px; transition: all 0.15s; }
.choice.selected .choice-letter { background: var(--gold); color: #111; }
.choice.correct .choice-letter { background: var(--teal); color: #111; }
.choice.wrong .choice-letter { background: var(--coral); color: #fff; }

.feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; }
.feedback.show { display: block; }
.feedback.correct { background: rgba(62,207,178,0.12); color: var(--teal); border: 1px solid rgba(62,207,178,0.3); }
.feedback.wrong { background: rgba(255,107,107,0.1); color: var(--coral); border: 1px solid rgba(255,107,107,0.3); }

.q-nav { display: flex; justify-content: flex-end; margin-top: 1.25rem; }
.btn-next { height: 42px; padding: 0 22px; background: var(--gold); color: #111; border: none; border-radius: 9px; font-size: 14px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; display: none; transition: all 0.15s; }
.btn-next.show { display: block; }
.btn-next:hover { background: #f7d35a; }

/* ── Results ── */
.results-circle { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); background: rgba(245,200,66,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
.results-score { font-family: 'Lora', serif; font-size: 32px; font-weight: 600; color: var(--gold); line-height: 1; }
.results-denom { font-size: 12px; color: var(--muted); margin-top: 2px; }
.results-pass { text-align: center; margin-bottom: 1.5rem; }
.results-pass h3 { font-family: 'Lora', serif; font-size: 22px; margin-bottom: 6px; }
.results-pass p { font-size: 14px; color: var(--muted); line-height: 1.6; }
.pts-earned { text-align: center; background: rgba(62,207,178,0.1); border: 1px solid rgba(62,207,178,0.3); border-radius: 10px; padding: 14px; margin-bottom: 1.5rem; }
.pts-earned .pts-num { font-family: 'Lora', serif; font-size: 28px; color: var(--teal); font-weight: 600; }
.pts-earned .pts-label { font-size: 13px; color: var(--teal); opacity: 0.8; margin-top: 2px; }
.results-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.results-actions .btn { flex: 1; min-width: 140px; }

/* ── History ── */
.history-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.history-item:last-child { border-bottom: none; }
.h-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.h-pass { background: rgba(62,207,178,0.15); color: var(--teal); }
.h-fail { background: rgba(255,107,107,0.12); color: var(--coral); }
.h-title { flex: 1; color: var(--text); font-weight: 600; }
.h-score { color: var(--muted); }
.h-pts { font-weight: 700; }
.h-pts.earned { color: var(--teal); }
.h-pts.none { color: var(--muted); }

/* ── Version badge ── */
.version-dots { display: flex; gap: 5px; margin-top: 5px; }
.vdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.vdot.taken { background: var(--coral); }
.vdot.next { background: var(--gold); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

.error-msg { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: var(--coral); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 600; margin-top: 10px; display: none; }
.error-msg.show { display: block; }

/* ── Passcode screen (typed) ── */
.pass-input-wrap { position: relative; margin-bottom: 14px; }
.pass-input { width: 100%; height: 50px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0 44px 0 16px; font-size: 20px; font-family: 'Nunito', sans-serif; color: var(--text); letter-spacing: 0.25em; transition: border-color 0.2s; }
.pass-input:focus { outline: none; border-color: var(--gold); }
.pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; }

/* ── Teacher view ── */
.tv-period-group { margin-bottom: 1.5rem; }
.tv-period-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.tv-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px 14px; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(46,51,72,0.5); font-size: 13px; }
.tv-row:last-child { border-bottom: none; }
.tv-name { font-weight: 600; color: var(--text); }
.tv-books { color: var(--muted); font-size: 12px; }
.tv-pts { font-weight: 700; color: var(--gold); min-width: 60px; text-align: right; }
.tv-badge { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-weight: 700; }
.tv-badge.pass { background: rgba(62,207,178,0.15); color: var(--teal); }
.tv-badge.fail { background: rgba(255,107,107,0.1); color: var(--coral); }
.tv-empty { color: var(--muted); font-size: 14px; padding: 1rem 0; text-align: center; }
.tv-meta { font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; }
.tv-search { width: 100%; height: 40px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-size: 13px; font-family: 'Nunito', sans-serif; color: var(--text); margin-bottom: 1.25rem; }
.tv-search:focus { outline: none; border-color: var(--gold); }
.tv-stat-row { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tv-stat { flex: 1; min-width: 100px; background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; }
.tv-stat-num { font-family: 'Lora', serif; font-size: 22px; color: var(--gold); }
.tv-stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

@media(max-width:480px) {
  .card { padding: 1.25rem; }
  .results-actions { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">

<!-- ── PASSCODE SCREEN (with student selection) ── -->
<div id="screen-passcode" class="screen active">
  <div class="site-header">
    <div class="eyebrow">6th Grade Reading Program</div>
    <h1>Reading <span>Quest</span></h1>
    <p>Prove you read it. Earn your points.</p>
  </div>
  <div class="card" style="max-width:420px; margin:0 auto;">

    <label class="name-label" for="periodSelect">Select your class period</label>
    <select id="periodSelect" class="name-input" onchange="onPeriodChange()" style="cursor:pointer; margin-bottom:12px;">
      <option value="">— Choose a period —</option>
    </select>

    <div id="nameSelectWrap" style="display:none; margin-bottom:12px;">
      <label class="name-label" for="nameSelect">Select your name</label>
      <select id="nameSelect" class="name-input" style="cursor:pointer;">
        <option value="">— Choose your name —</option>
      </select>
    </div>

    <div id="passcodeWrap" style="display:none;">
      <label class="name-label" style="margin-top:4px;">Teacher enters passcode</label>
      <div class="pass-input-wrap">
        <input type="password" id="passcodeInput" class="pass-input" placeholder="••••••••••••" autocomplete="off" />
        <button class="pass-toggle" onclick="togglePassVis()" id="passToggle">👁</button>
      </div>
    </div>

    <div class="error-msg" id="passcodeError" style="margin-top:10px;"></div>
    <div style="margin-top:14px;">
      <button class="btn btn-gold btn-full" id="enterBtn" onclick="handleEnter()" disabled>Select your name to continue</button>
    </div>
  </div>
</div>

<!-- ── NAME / PERIOD SCREEN (kept for compatibility, never shown) ── -->
<div id="screen-name" class="screen" style="display:none !important;"></div>

<!-- ── SHELF SCREEN ── -->
<div id="screen-shelf" class="screen">
  <div class="site-header" style="padding-top:2rem;">
    <div class="eyebrow" id="shelfGreeting"></div>
    <h1>Your <span>Library</span></h1>
  </div>
  <div class="shelf-header">
    <h2>Choose a book to quiz</h2>
    <div class="points-badge">⭐ <span id="totalPoints">0</span> pts total</div>
  </div>
  <div class="book-grid" id="bookGrid"></div>
  <div style="margin-top:1.5rem;">
    <button class="btn btn-ghost" onclick="showHistory()" style="font-size:13px; height:38px; padding:0 16px;">View attempt history</button>
  </div>
</div>

<!-- ── QUIZ SCREEN ── -->
<div id="screen-quiz" class="screen">
  <div style="padding-top:1.5rem;" class="quiz-top">
    <div class="quiz-book-name" id="quizBookName"></div>
    <div class="quiz-sub" id="quizSub"></div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="card" id="questionCard"></div>
</div>

<!-- ── RESULTS SCREEN ── -->
<div id="screen-results" class="screen">
  <div style="padding-top:1.5rem;"></div>
  <div class="card" style="text-align:center;">
    <div class="results-circle">
      <div class="results-score" id="resScore"></div>
      <div class="results-denom" id="resDenom"></div>
    </div>
    <div class="results-pass">
      <h3 id="resTitle"></h3>
      <p id="resMsg"></p>
    </div>
    <div class="pts-earned" id="ptsBox" style="display:none;">
      <div class="pts-num" id="resPts"></div>
      <div class="pts-label" id="resPtsLabel"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-ghost" onclick="goShelf()">Back to library</button>
      <button class="btn btn-gold" id="retryBtn" onclick="retryQuiz()">Try again</button>
      <button class="btn btn-ghost" onclick="goHome()" style="width:100%; margin-top:6px; font-size:13px;">Done — next student</button>
    </div>
  </div>
</div>

<!-- ── HISTORY SCREEN ── -->
<div id="screen-history" class="screen">
  <div style="padding-top:1.5rem; margin-bottom:1rem; display:flex; align-items:center; gap:12px;">
    <button class="btn btn-ghost" style="height:36px;padding:0 14px;font-size:13px;" onclick="goShelf()">← Back</button>
    <span style="font-family:'Lora',serif; font-size:18px;">Attempt History</span>
  </div>
  <div class="card">
    <div id="historyList"></div>
  </div>
</div>

<!-- ── TEACHER VIEW SCREEN ── -->
<div id="screen-teacher" class="screen">
  <div style="padding-top:1.5rem; margin-bottom:1rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
    <span style="font-family:'Lora',serif; font-size:20px;">Teacher Dashboard</span>
    <button class="btn btn-ghost" style="height:36px;padding:0 14px;font-size:13px;" onclick="showScreen('screen-passcode')">← Exit</button>
  </div>
  <div class="tv-stat-row" id="tvStats"></div>
  <input type="text" class="tv-search" id="tvSearch" placeholder="Search student name..." oninput="renderTeacherView()">
  <div id="tvContent"></div>
</div>

</div><!-- /container -->

<script>
// ════════════════════════════════════════════
// BOOK DATA + POINT VALUES
// ════════════════════════════════════════════
const BOOKS = [
  {
    id: "hatchet",
    title: "Hatchet",
    author: "Gary Paulsen",
    emoji: "🪓",
    points: 200,
    lexile: "1020L",
    pages: 192,
    quizzes: [
      // ── QUIZ 1 ──
      [
        { q: "What gift does Brian's mother give him just before he leaves for his father's in Canada?", choices: ["A compass","A hunting knife","A hatchet","A first-aid kit"], answer: 2 },
        { q: "What is the 'secret' that haunts Brian throughout the novel?", choices: ["He failed his final exams before summer","He saw his mother with another man before the divorce","He lost his father's watch on the plane","He burned down part of his school"], answer: 1 },
        { q: "How does Brian land the plane after the pilot's heart attack?", choices: ["He radios a tower and follows instructions","He follows a road until he spots a field","He steers toward a lake and crashes into the water","He activates the autopilot and waits for rescue"], answer: 2 },
        { q: "What is the first food Brian successfully obtains in the wilderness?", choices: ["Fish","Raspberries","A rabbit","Bird eggs"], answer: 1 },
        { q: "What near-disaster does Brian face right after finding raspberries?", choices: ["He is stung by bees","He encounters a bear","A tornado destroys his shelter","He falls into the lake"], answer: 1 },
        { q: "Brian's first attempt to make fire fails because he doesn't understand what key ingredient is needed. What does he realize he is missing?", choices: ["Dry tinder stacked in a tight bundle","Air — something to breathe life into the flame","Two pieces of flint rock to produce sparks","Direct sunlight focused through a lens"], answer: 1 },
        { q: "What does Brian call the birds whose eggs he harvests near his shelter?", choices: ["Foolbirds","Luckbirds","Meadowlarks","Plovers"], answer: 0 },
        { q: "What natural disaster strikes Brian's camp and reshapes his situation near the end of the story?", choices: ["A wildfire","A flood","A tornado","A blizzard"], answer: 2 },
        { q: "How does Brian finally signal the rescue plane that finds him?", choices: ["He builds a large signal fire","He uses a mirror from the survival pack","He swims into the lake waving his shirt","He fires a flare from the survival pack"], answer: 3 },
        { q: "When Brian dives to the submerged plane to retrieve the survival pack, what dangerous animal attacks him in the water?", choices: ["A pike fish","A snapping turtle","A moose","A wolf"], answer: 0 }
      ],
      // ── QUIZ 2 ──
      [
        { q: "What is Brian's last name?", choices: ["Robeson","Paulsen","Carter","Walters"], answer: 0 },
        { q: "How does the pilot of the plane die?", choices: ["He is struck by lightning","He has a massive heart attack","He crashes into a bird","He falls asleep and loses control"], answer: 1 },
        { q: "What province of Canada does Brian crash-land in?", choices: ["Ontario","British Columbia","Saskatchewan","Quebec"], answer: 2 },
        { q: "What does Brian use to make sparks when creating fire?", choices: ["Two dry sticks he rubs vigorously together","The blade of his hatchet struck hard against a rock","A cracked lens he removes from his glasses","Pieces of sharp flint he finds along the lakeshore"], answer: 1 },
        { q: "Brian builds his shelter under what kind of natural feature?", choices: ["A hollow log","A rocky overhang/ledge","A spruce tree","A sand dune"], answer: 1 },
        { q: "A porcupine enters Brian's shelter and injures him. What does he do immediately after?", choices: ["He grabs a large rock and kills it for food","He hurls his hatchet at it — it hits the wall and leaves his hand badly bruised","He scrambles out through the shelter door to escape the quills","He pins it beneath a flat rock and waits for it to leave"], answer: 1 },
        { q: "The book describes a turning point where Brian stops wallowing and starts focusing on survival. How is this shift described?", choices: ["It is called the Awakening — he wakes from a vivid dream about his father and is transformed","It is called the Change — Paulsen marks it as a defined turning point with that label","It is not named — he simply recognizes self-pity is useless and shifts his entire focus to survival","It is called the Reset — Brian uses this exact word in his own internal monologue"], answer: 2 },

function onPeriodChange() {
  const periodIdx = document.getElementById('periodSelect').value;
  const nameSel   = document.getElementById('nameSelect');
  const nameWrap  = document.getElementById('nameSelectWrap');
  const passWrap  = document.getElementById('passcodeWrap');
  const btn       = document.getElementById('enterBtn');

  errEl.classList.remove('show');
  nameSel.innerHTML = '<option value="">— Choose your name —</option>';
  nameWrap.style.display  = 'none';

  btn.disabled = false;
  btn.textContent = 'Select your name to continue';
}

function onNameChange() {
  const nameVal  = document.getElementById('nameSelect').value;
  const passWrap = document.getElementById('passcodeWrap');
  const btn      = document.getElementById('enterBtn');
  const errEl    = document.getElementById('passcodeError');
  errEl.classList.remove('show');
  if (nameVal) {
    passWrap.style.display = 'block';
    btn.textContent = 'Enter →';
    document.getElementById('passcodeInput').value = '';
    setTimeout(() => document.getElementById('passcodeInput').focus(), 100);
  } else {
    passWrap.style.display = 'none';
    btn.textContent = 'Select your name to continue';
  }
}

function togglePassVis() {
  const inp = document.getElementById('passcodeInput');
  const btn = document.getElementById('passToggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function handleEnter() {
  const periodIdx = document.getElementById('periodSelect').value;
  const nameVal   = document.getElementById('nameSelect').value;
  const passVal   = document.getElementById('passcodeInput').value; // no trim — case sensitive
  const errEl     = document.getElementById('passcodeError');
  errEl.classList.remove('show');

  if (!periodIdx) {
    errEl.textContent = 'Please select a class period.';
    errEl.classList.add('show');
    return;
  }
  if (!nameVal) {
    errEl.textContent = 'Please select your name.';
    errEl.classList.add('show');
    return;
  }
  if (!passVal) {
    errEl.textContent = 'Please enter the passcode.';
    errEl.classList.add('show');
    document.getElementById('passcodeInput').focus();
    return;
  }

  // Teacher passcode — go to dashboard
  if (passVal === TEACHER_PASSCODE) {
    document.getElementById('passcodeInput').value = '';
    loadTeacherView();
    showScreen('screen-teacher');
    return;
  }

  // Student passcode — go to quiz shelf
  if (passVal === CLASS_PASSCODE) {
    document.getElementById('passcodeInput').value = '';
    launchStudent(nameVal, parseInt(periodIdx));
    return;
  }

  // Wrong passcode
  errEl.textContent = 'Incorrect passcode. Try again.';
  errEl.classList.add('show');
  document.getElementById('passcodeInput').value = '';
  document.getElementById('passcodeInput').focus();
}

// ── Shuffle helper ──────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Pick a random unused quiz version ───────
function getNextVersion(bookId) {
  const taken = getAttempts(bookId).map(a => a.version);
  const available = [0, 1, 2].filter(v => !taken.includes(v));
  if (available.length === 0) return null;
  return available[Math.floor(Math.random() * available.length)];
}

// ── Attempt helpers ──────────────────────────
function getAttempts(bookId) {
  const book = BOOKS.find(b => b.id === bookId);
  if (!book) return [];
  return studentAttempts.filter(a => a.book === book.title);
}

function getTotalPoints() {
  let pts = 0;
  BOOKS.forEach(b => {
    if (getAttempts(b.id).some(a => a.passed)) pts += b.points;
  });
  return pts;
}

function hasPassed(bookId) { return getAttempts(bookId).some(a => a.passed); }

// ── Load student data from Google Sheets ────
async function loadStudentData(name) {
  if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_GOOGLE')) { studentAttempts = []; return; }
  try {
    const url = `${SCRIPT_URL}?action=getStudent&name=${encodeURIComponent(name)}`;
    const res = await fetch(url);
    const data = await res.json();
    studentAttempts = data.attempts || [];
  } catch (e) {
    console.warn('Could not load from Sheets.', e);
    studentAttempts = [];
  }
}

// ── Save attempt to Google Sheets ───────────
async function saveAttemptToSheets(bookId, attempt) {
  const book = BOOKS.find(b => b.id === bookId);
  studentAttempts.push({ book: book.title, ...attempt });
  const total = getTotalPoints();
  const booksPassed = BOOKS.filter(b => hasPassed(b.id)).length;
  if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_GOOGLE')) return;
  try {
    const params = new URLSearchParams({
      action:      'saveAttempt',
      name:        studentName,
      period:      studentPeriod,
      book:        book.title,
      version:     attempt.version,
      score:       attempt.score,
      passed:      attempt.passed,
      points:      book.points,
      total:       total,
      booksPassed: booksPassed
    });
    await fetch(`${SCRIPT_URL}?${params}`);
  } catch (e) {
    console.warn('Could not save to Sheets.', e);
  }
}

}

async function launchStudent(nameVal, periodIdx) {
  studentName   = nameVal;
  studentPeriod = CLASS_ROSTER[periodIdx].period;
  const btn = document.getElementById('enterBtn');
  btn.textContent = 'Loading...';
  btn.disabled = true;
  await loadStudentData(studentName);
  btn.textContent = 'Enter →';
  btn.disabled = false;
  buildShelf();
  showScreen('screen-shelf');
}

// Legacy stub — no longer called but kept to avoid errors
async function startApp() {
  const periodIdx = document.getElementById('periodSelect').value;
  const nameVal   = document.getElementById('nameSelect').value;
  if (periodIdx && nameVal) await launchStudent(nameVal, parseInt(periodIdx));
}

function buildShelf() {
  document.getElementById('shelfGreeting').textContent = `${studentPeriod} · ${studentName}`;
  document.getElementById('totalPoints').textContent = getTotalPoints();
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = '';
  BOOKS.forEach(b => {
    const passed = hasPassed(b.id);
    const nextV = getNextVersion(b.id);
    const attempts = getAttempts(b.id);
    const allUsed = nextV === null;
    const div = document.createElement('div');
    div.className = 'book-item' + (passed ? ' completed' : '');
    let ptsHTML;
    if (passed) ptsHTML = `<div class="book-pts earned">✓ ${b.points} pts earned</div>`;
    else if (attempts.length > 0) ptsHTML = `<div class="book-pts attempted">${b.points} pts — retry</div>`;
    else ptsHTML = `<div class="book-pts">${b.points} pts</div>`;
    let vdots = '';
    if (!passed) {
      vdots = '<div class="version-dots">';
      const takenVersions = attempts.map(a => a.version);
      for (let i = 0; i < 3; i++) {
        const taken = takenVersions.includes(i);
        vdots += `<div class="vdot ${taken ? 'taken' : ''}"></div>`;
      }
      vdots += '</div>';
    }
    div.innerHTML = `<div class="book-emoji">${b.emoji}</div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-meta">${b.author} · ${b.pages} pages · Lexile ${b.lexile}${vdots}</div>
      </div>${ptsHTML}`;
    if (!passed && !allUsed) div.onclick = () => startQuiz(b.id);
    else if (allUsed && !passed) div.onclick = () => alert("You've used all 3 quiz versions for this book. Talk to your teacher.");
    grid.appendChild(div);
  });
}

function goShelf() {
  buildShelf();
  showScreen('screen-shelf');
}

function goHome() {
  // Reset the passcode screen for the next student
  document.getElementById('periodSelect').value = '';
  document.getElementById('nameSelect').innerHTML = '<option value="">— Choose your name —</option>';
  document.getElementById('nameSelectWrap').style.display = 'none';
  document.getElementById('passcodeWrap').style.display = 'none';
  document.getElementById('passcodeInput').value = '';
  document.getElementById('passcodeError').classList.remove('show');
  document.getElementById('enterBtn').textContent = 'Select your name to continue';
  document.getElementById('enterBtn').disabled = true;
  studentName = '';
  studentPeriod = '';
  studentAttempts = [];
  showScreen('screen-passcode');
}

function showHistory() {
  const list = document.getElementById('historyList');
  let html = '';
  let any = false;
  BOOKS.forEach(b => {
    getAttempts(b.id).forEach(a => {
      any = true;
      html += `<div class="history-item">
        <div class="h-icon ${a.passed ? 'h-pass' : 'h-fail'}">${a.passed ? '✓' : '✗'}</div>
        <div class="h-title">${b.title} <span style="color:var(--muted);font-weight:400;">v${a.version + 1}</span></div>
        <div class="h-score">${a.score}/10</div>
        <div class="h-pts ${a.passed ? 'earned' : 'none'}">${a.passed ? '+' + b.points + ' pts' : '—'}</div>
      </div>`;
    });
  });
  if (!any) html = '<div style="color:var(--muted);font-size:14px;padding:8px 0;">No attempts yet.</div>';
  list.innerHTML = html;
  showScreen('screen-history');
}

// ════════════════════════════════════════════
// QUIZ LOGIC — with shuffle
// ════════════════════════════════════════════
function startQuiz(bookId) {
  currentBookId = bookId;
  currentQuizIdx = getNextVersion(bookId);
  currentQ = 0;
  answers = [];

  // Shuffle question order
  const book = BOOKS.find(b => b.id === bookId);
  const rawQuestions = book.quizzes[currentQuizIdx];
  // For each question, shuffle the choices and track new correct index
  shuffledQuestions = shuffle(rawQuestions).map(q => {
    const indices = shuffle([0, 1, 2, 3]);
    const newChoices = indices.map(i => q.choices[i]);
    const newAnswer = indices.indexOf(q.answer);
    return { q: q.q, choices: newChoices, answer: newAnswer };
  });

  document.getElementById('quizBookName').textContent = book.title;
  document.getElementById('quizSub').textContent = `${book.author} · Attempt ${getAttempts(bookId).length + 1}`;
  renderQuestion();
  showScreen('screen-quiz');
}

function retryQuiz() {
  const nextV = getNextVersion(currentBookId);
  if (nextV === null) { alert("You've used all 3 quiz versions for this book. Talk to your teacher."); goShelf(); return; }
  startQuiz(currentBookId);
}

function renderQuestion() {
  const q = shuffledQuestions[currentQ];
  const total = shuffledQuestions.length;
  document.getElementById('quizSub').textContent =
    `${BOOKS.find(b => b.id === currentBookId).author} · Question ${currentQ + 1} of ${total}`;
  document.getElementById('progressFill').style.width = `${(currentQ / total) * 100}%`;
  const card = document.getElementById('questionCard');
  card.innerHTML = `
    <div class="q-num">Question ${currentQ + 1} of ${total}</div>
    <div class="q-text">${q.q}</div>
    <div class="choices" id="choices">
      ${q.choices.map((c, i) => `
        <button class="choice" onclick="selectChoice(${i})" data-i="${i}">
          <span class="choice-letter">${['A', 'B', 'C', 'D'][i]}</span>
          <span>${c}</span>
        </button>`).join('')}
    </div>
    <div class="q-nav"><button class="btn-next" id="nextBtn" onclick="nextQ()">${currentQ < total - 1 ? 'Next →' : 'See results →'}</button></div>`;
}

function selectChoice(idx) {
  const q = shuffledQuestions[currentQ];
  const btns = document.querySelectorAll('.choice');
  btns.forEach(b => { b.classList.remove('selected'); b.disabled = true; });
  btns[idx].classList.add('selected');
  answers.push(idx === q.answer ? 1 : 0);
  document.getElementById('nextBtn').classList.add('show');
}

async function nextQ() {
  currentQ++;
  if (currentQ >= shuffledQuestions.length) { await showResults(); return; }
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function showResults() {
  const book = BOOKS.find(b => b.id === currentBookId);
  const score = answers.reduce((a, b) => a + b, 0);
  const passed = score >= 8;
  const attempt = { version: currentQuizIdx, score, passed, date: Date.now() };
  await saveAttemptToSheets(currentBookId, attempt);

  document.getElementById('resScore').textContent = score;
  document.getElementById('resDenom').textContent = `out of ${shuffledQuestions.length}`;
  let title, msg;
  if (passed) { title = '🎉 You passed!'; msg = `Great job proving you read ${book.title}. You've earned your points!`; }
  else if (score >= 5) { title = 'Almost there!'; msg = `You got ${score}/10. You need 8 to pass. Try again!`; }
  else { title = 'Keep reading!'; msg = `You got ${score}/10. Spend more time with the book and try again.`; }
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resMsg').textContent = msg;
  const ptsBox = document.getElementById('ptsBox');
  if (passed) {
    ptsBox.style.display = 'block';
    document.getElementById('resPts').textContent = `+${book.points} points`;
    document.getElementById('resPtsLabel').textContent = `New total: ${getTotalPoints()} pts`;
  } else { ptsBox.style.display = 'none'; }
  const nextV = getNextVersion(currentBookId);
  const retryBtn = document.getElementById('retryBtn');
  if (nextV === null || passed) retryBtn.style.display = 'none';
  else { retryBtn.style.display = ''; retryBtn.textContent = `Try again →`; }
  showScreen('screen-results');
}

// ════════════════════════════════════════════
// TEACHER VIEW
// ════════════════════════════════════════════
let allStudentData = [];

async function loadTeacherView() {
  document.getElementById('tvContent').innerHTML =
    '<div class="tv-empty">Loading class data...</div>';
  document.getElementById('tvStats').innerHTML = '';
  if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_GOOGLE')) {
    document.getElementById('tvContent').innerHTML =
      '<div class="tv-empty">Connect Google Sheets to see live data.</div>';
    return;
  }
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getAllStudents`);
    const data = await res.json();
    allStudentData = data.students || [];
    renderTeacherView();
  } catch (e) {
    document.getElementById('tvContent').innerHTML =
      '<div class="tv-empty">Could not load data. Check your Script URL.</div>';
  }
}

function renderTeacherView() {
  const search = (document.getElementById('tvSearch').value || '').toLowerCase();
  // Build summary stats
  const totalStudents = allStudentData.length;
  const totalAttempts = allStudentData.reduce((s, st) => s + st.attempts, 0);
  const passing = allStudentData.filter(st => st.booksPassed > 0).length;
  const topPoints = allStudentData.length
    ? Math.max(...allStudentData.map(s => s.totalPoints))
    : 0;
  document.getElementById('tvStats').innerHTML = `
    <div class="tv-stat"><div class="tv-stat-num">${totalStudents}</div><div class="tv-stat-label">Students</div></div>
    <div class="tv-stat"><div class="tv-stat-num">${totalAttempts}</div><div class="tv-stat-label">Total attempts</div></div>
    <div class="tv-stat"><div class="tv-stat-num">${passing}</div><div class="tv-stat-label">Passed ≥1 book</div></div>
    <div class="tv-stat"><div class="tv-stat-num">${topPoints}</div><div class="tv-stat-label">Top score</div></div>`;

  // Group by period, sorted alphabetically within each period
  const grouped = {};
  CLASS_ROSTER.forEach(p => { grouped[p.period] = []; });
  grouped['Other'] = [];

  allStudentData.forEach(st => {
    if (search && !st.name.toLowerCase().includes(search)) return;
    const period = st.period || 'Other';
    if (!grouped[period]) grouped[period] = [];
    grouped[period].push(st);
  });

  // Also add roster students who have no data yet
  CLASS_ROSTER.forEach(p => {
    p.students.forEach(name => {
      if (search && !name.toLowerCase().includes(search)) return;
      if (!grouped[p.period].find(s => s.name === name)) {
        grouped[p.period].push({ name, period: p.period, totalPoints: 0, booksPassed: 0, attempts: 0, lastActive: null });
      }
    });
  });

  let html = '';
  const periods = [...CLASS_ROSTER.map(p => p.period), 'Other'];
  periods.forEach(period => {
    const students = grouped[period];
    if (!students || students.length === 0) return;
    students.sort((a, b) => a.name.localeCompare(b.name));
    html += `<div class="tv-period-group card">
      <div class="tv-period-label">${period}</div>`;
    students.forEach(st => {
      const lastSeen = st.lastActive
        ? new Date(st.lastActive).toLocaleDateString()
        : 'No attempts';
      html += `<div class="tv-row">
        <div>
          <div class="tv-name">${st.name}</div>
          <div class="tv-books">${st.booksPassed} book${st.booksPassed !== 1 ? 's' : ''} passed · ${st.attempts} attempt${st.attempts !== 1 ? 's' : ''} · Last: ${lastSeen}</div>
        </div>
        <div class="tv-pts">${st.totalPoints} pts</div>
      </div>`;
    });
    html += `</div>`;
  });
  if (!html) html = '<div class="tv-empty">No students match your search.</div>';
  document.getElementById('tvContent').innerHTML = html;
}
